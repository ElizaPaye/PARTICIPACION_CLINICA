{% extends 'base.html' %}

{% block title %} CONSULTAS | CREATE {% endblock %}

{% block content %}

<h1>Registro de consulta</h1>

<form action="{{ url_for('consulta.create') }}" method="POST">

    <div class="mb-3">
        <label class="form-label">Médico</label>
        <select name="medico_id" class="form-control" required>
            <option disabled selected value="">Seleccione un médico</option>
            {% for medico in medicos %}
            <option value="{{ medico.id }}">{{ medico.nombre }} - {{ medico.especialidad }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Paciente</label>
        <select name="paciente_id" class="form-control" required>
            <option disabled selected value="">Seleccione un paciente</option>
            {% for paciente in pacientes %}
            <option value="{{ paciente.id }}">{{ paciente.nombre }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Diagnóstico</label>
        <input type="text" class="form-control" name="diagnostico" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tratamiento</label>
        <input type="text" class="form-control" name="tratamiento" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-control" name="fecha" required>
    </div>

    <button type="submit" class="btn btn-primary">
        Registrar consulta
    </button>

</form>

{% endblock %}
