<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} Clínica Médica {% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">

        <a class="navbar-brand" href="/">CLÍNICA</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

          <ul class="navbar-nav">

            <li class="nav-item">
              <a class="nav-link {{ is_active('/medicos/') }}" href="/medicos/">
                Médicos
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {{ is_active('/pacientes/') }}" href="/pacientes/">
                Pacientes
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {{ is_active('/consultas/') }}" href="/consultas/">
                Consultas
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {{ is_active('/usuarios/') }}" href="/usuarios/">
                Usuarios
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-danger" href="#">
                Salir
              </a>
            </li>

          </ul>

        </div>
      </div>
    </nav>

    <div class="container mt-4">
      {% block content %}
      {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
