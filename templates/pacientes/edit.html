{% extends 'base.html' %}

{% block title %} PACIENTES | EDIT {% endblock %}

{% block content %}

<h1>Actualización de paciente</h1>

<form action="{{url_for('paciente.edit', id=paciente.id)}}" method="POST">

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" value="{{ paciente.nombre }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Edad</label>
        <input type="number" class="form-control" name="edad" value="{{ paciente.edad }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" name="direccion" value="{{ paciente.direccion }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="number" class="form-control" name="telefono" value="{{ paciente.telefono }}" required>
    </div>

    <button type="submit" class="btn btn-primary">
        Actualizar paciente
    </button>

</form>

{% endblock %}
